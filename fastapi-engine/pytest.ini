[pytest]
# Silenciar el warning de starlette sobre httpx/httpx2 que aparece en
# test_main.py al importar TestClient. No es un bug del proyecto: viene
# de la librería starlette anunciando que prefieren httpx2 en el futuro.
# Mantenerlo escondido evita ruido en la salida de los tests.
filterwarnings =
    ignore:Using `httpx` with `starlette.testclient`:UserWarning
    ignore:Using `httpx` with `starlette.testclient`:DeprecationWarning
