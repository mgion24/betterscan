# Override para auditoría real desde un host Kali / Linux.
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.kali.yml up -d --build
#
# Diferencias con el despliegue normal:
#  1. fastapi-engine corre en network_mode: host para ver las interfaces
#     reales del host (wlan0, eth0...) y poder hacer SYN scans / OS
#     detection contra la LAN.
#  2. Le damos las capabilities NET_RAW y NET_ADMIN (necesarias para -sS, -O).
#  3. El web habla con FastAPI vía host.docker.internal:8888 (puerto del host).
#  4. FastAPI hace callback al web por https://localhost (puerto 443 del host).

services:

  fastapi-engine:
    network_mode: host
    networks: !reset null
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      LARAVEL_BASE_URL: https://localhost
      NVD_API_KEY: ${NVD_API_KEY}
      RUNNING_ON_HOST: "true"

  web:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_MIGRATE_USER: root
      DB_MIGRATE_PASSWORD: ${DB_ROOT_PASSWORD}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      FASTAPI_BASE_URL: http://host.docker.internal:8888
      CALLBACK_BASE_URL: https://localhost
