# Apache: VirtualHost HTTP (redirige a HTTPS) + HTTPS con self-signed.

# HTTP -> HTTPS
<VirtualHost *:80>
    ServerName localhost
    RewriteEngine On
    RewriteRule ^/?(.*) https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /var/www/html/public

    SSLEngine on
    SSLCertificateFile      /etc/apache2/certs/betterscan.crt
    SSLCertificateKeyFile   /etc/apache2/certs/betterscan.key

    # Cabeceras básicas de seguridad.
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=63072000"

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        # mod_rewrite para las rutas amigables de Laravel.
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>

    # No servir el .env ni ficheros ocultos por accidente.
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
